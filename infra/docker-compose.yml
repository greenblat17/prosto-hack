services:
  postgres:
    image: postgres:16-alpine
    container_name: analytics-db
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: analytics-backend
    ports:
      - "8080:8080"
    volumes:
      - duckdb_data:/data
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: analytics
      DB_USER: analytics
      DB_PASSWORD: analytics
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-https://openrouter.ai/api/v1/chat/completions}
      AI_MODEL: ${AI_MODEL:-anthropic/claude-sonnet-4}
      AI_HTTP_REFERER: ${AI_HTTP_REFERER:-http://localhost:3000}
      AI_APP_TITLE: ${AI_APP_TITLE:-Prosto Analytics}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      DUCKDB_PATH: /data/duckdb-cache.duckdb
      DUCKDB_MAX_DISK_GB: "10"
      DUCKDB_TTL_MINUTES: "120"
    depends_on:
      postgres:
        condition: service_healthy

  user-postgres:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: company_data
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
    ports:
      - "25432:5432"
    volumes:
      - user_pgdata:/var/lib/postgresql/data
      - ./init-user-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d company_data"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: analytics-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  user_pgdata:
  duckdb_data:
