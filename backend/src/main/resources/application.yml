server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:analytics}
    username: ${DB_USER:analytics}
    password: ${DB_PASSWORD:analytics}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      data-source-properties:
        statement_timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

ai:
  api-url: ${AI_API_URL:https://openrouter.ai/api/v1/chat/completions}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:anthropic/claude-sonnet-4}
  temperature: 0.2
  # OpenRouter рекомендует заголовки атрибуции; без них иногда 403 или пустой content
  http-referer: ${AI_HTTP_REFERER:http://localhost:3000}
  app-title: ${AI_APP_TITLE:Prosto Analytics}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.prosto.analytics.service.AiChatService: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  pivot:
    max-result-rows: 10000
  duckdb:
    path: ${DUCKDB_PATH:/data/duckdb-cache.duckdb}
    max-disk-gb: ${DUCKDB_MAX_DISK_GB:10}
    ttl-minutes: ${DUCKDB_TTL_MINUTES:1440}
  jwt:
    secret: ${JWT_SECRET:prosto-analytics-jwt-secret-key-for-development-only-minimum-256-bits}
    expiration: 86400000
