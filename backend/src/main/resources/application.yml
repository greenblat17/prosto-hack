server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:analytics}
    username: ${DB_USER:analytics}
    password: ${DB_PASSWORD:analytics}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

ai:
  api-url: ${AI_API_URL:https://openrouter.ai/api/v1/chat/completions}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:google/gemini-2.0-flash-lite-001}
  temperature: 0.2

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  pivot:
    max-result-rows: 10000
  duckdb:
    path: ${DUCKDB_PATH:/data/duckdb-cache.duckdb}
    max-disk-gb: ${DUCKDB_MAX_DISK_GB:10}
    ttl-minutes: ${DUCKDB_TTL_MINUTES:30}
  jwt:
    secret: ${JWT_SECRET:prosto-analytics-jwt-secret-key-for-development-only-minimum-256-bits}
    expiration: 86400000
